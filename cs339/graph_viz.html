}

function renderLegend() {
  const items = [
    { fill:'#ffffff', border:'#B4B2A9', label:'unvisited' },
    { fill:'#EEEDFE', border:'#534AB7', label:'start' },
  ];
  if (TAB_CFG[activeTab].needsTarget || (activeTab==='dijk' && targetNode))
    items.push({ fill:'#FBEAF0', border:'#993556', label:'target' });
  if (activeTab==='search')
    items.push({ fill:'#FAEEDA', border:'#BA7517', label: activeSub==='dfs' ? 'on stack' : 'in queue' });
  else if (activeTab==='topo' && activeSub==='dfs')
    items.push({ fill:'#FAEEDA', border:'#BA7517', label:'processing' });
  else if (activeTab==='topo' && activeSub==='kahn')
    items.push({ fill:'#EAF3DE', border:'#3B6D11', label:'zero in-degree' });
  if (activeTab==='topo')
    items.push({ fill:'#E1F5EE', border:'#0F6E56', label:'source (in-degree 0)' });
  if (activeTab==='search')
    items.push({ fill:'#EF9F27', border:'#854F0B', label:'current (being processed)' });
  if (activeTab==='topo')
    items.push({ fill:'#EF9F27', border:'#854F0B', label:'current (being processed)' });
  if (activeTab==='search')
    items.push({ fill:'#EAF3DE', border:'#3B6D11', label:'visited ✓' });
  else if (activeTab!=='span' && activeTab!=='topo')
    items.push({ fill:'#EAF3DE', border:'#3B6D11', label:'visited' });
  if (activeTab==='topo' && activeSub==='dfs')
    items.push({ fill:'#F1EFE8', border:'#888780', label:'added to output ✓' });
  if (activeTab==='topo' && activeSub==='kahn')
    items.push({ fill:'#F1EFE8', border:'#888780', label:'removed from graph ✕' });
  if (activeTab==='span'||activeTab==='dijk')
    items.push({ fill:'#E1F5EE', border:'#0F6E56', label: activeTab==='span'?'in MST':'settled 🔒 (permanent)' });
  if (activeTab==='search')
    items.push({ fill:'#FCEBEB', border:'#A32D2D', label:'found' });
  if (activeTab==='dijk' && targetNode)
    items.push({ fill:'#FCEBEB', border:'#A32D2D', label:'target reached' });

  let html='';
  items.forEach(i => {
    html+=`<div class="leg"><span class="leg-dot" style="background:${i.fill};border-color:${i.border}"></span>${i.label}</div>`;
  });
  document.getElementById('legend').innerHTML=html;
}

function newWeightedGraph() {
  // Keep same nodes and topology, randomize weights 1-12
  const baseEdges = [
    ['A','B'], ['A','F'], ['B','G'], ['B','C'],
    ['C','D'], ['D','G'], ['D','E'], ['E','F'],
    ['E','G'], ['F','G']
  ];
  const newEdges = baseEdges.map(([a,b]) => [a, b, Math.floor(Math.random()*12)+1]);
  // Ensure no duplicate weights for clarity
  const seen = new Set();
  newEdges.forEach(e => {
    while (seen.has(e[2])) e[2] = e[2] % 12 + 1;
    seen.add(e[2]);
  });
  GRAPHS.weighted_u = { nodes: GRAPHS.weighted_u.nodes, edges: newEdges };
  // Directed version uses same edges with some reversed
  const dirEdges = [
    ['A','B',newEdges[0][2]], ['A','F',newEdges[1][2]], ['B','G',newEdges[2][2]], ['B','C',newEdges[3][2]],
    ['C','D',newEdges[4][2]], ['D','E',newEdges[6][2]], ['G','D',newEdges[5][2]], ['E','F',newEdges[7][2]],
    ['G','E',newEdges[8][2]], ['F','G',newEdges[9][2]]
  ];
  GRAPHS.weighted_d = { nodes: GRAPHS.weighted_d.nodes, edges: dirEdges };
  doReset();
}

function newDijkstraGraph() {
  // Same 7 nodes, same 10 base pairs — randomize both weight AND direction of each edge.
  // To keep the graph useful (reachable from any start), we use a base undirected
  // spanning tree and then randomly orient all edges, guaranteeing connectivity isn't
  // broken structurally (Dijkstra's handles unreachable nodes gracefully anyway).
  const basePairs = [
    ['A','B'], ['A','F'], ['B','G'], ['B','C'],
    ['C','D'], ['D','G'], ['D','E'], ['E','F'],
    ['E','G'], ['F','G']
  ];

  // Random unique weights 1–15
  const weights = [];
  const used = new Set();
  while (weights.length < basePairs.length) {
    const w = Math.floor(Math.random() * 15) + 1;
    if (!used.has(w)) { used.add(w); weights.push(w); }
  }

  // Random direction for each edge — flip ~half of them
  const newEdgesU = basePairs.map(([a,b], i) => [a, b, weights[i]]);
  const newEdgesD = basePairs.map(([a,b], i) => {
    const flip = Math.random() < 0.5;
    return flip ? [b, a, weights[i]] : [a, b, weights[i]];
  });

  GRAPHS.weighted_u = { nodes: GRAPHS.weighted_u.nodes, edges: newEdgesU };
  GRAPHS.weighted_d = { nodes: GRAPHS.weighted_d.nodes, edges: newEdgesD };
  doReset();
}

// Tab click
document.getElementById('tabs').addEventListener('click', e => {
  const t = e.target.dataset.tab;
  if (!t||t===activeTab) return;
  activeTab=t;
  // Set default subtab per tab
  if (t==='search') activeSub='dfs';
  else if (t==='topo') activeSub='dfs';
  else if (t==='span') activeSub='prim';
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active', el.dataset.tab===t));
  // Show/hide subtabs and set correct options
  const subtabsEl = document.getElementById('subtabs');
  const dirEl = document.getElementById('dir-toggle');
  const rowEl = subtabsEl.closest('div[style*="align-items:center"]');
  if (t==='search') {
    subtabsEl.style.display='flex';
    subtabsEl.innerHTML=`<div class="subtab active" data-sub="dfs">DFS</div><div class="subtab" data-sub="bfs">BFS</div>`;
    dirEl.style.display='flex';
    document.getElementById('order-toggle').style.display='flex';
    document.getElementById('visit-toggle').style.display='none';
    document.getElementById('topo-controls').style.display='none'; document.getElementById('span-controls').style.display='none'; document.getElementById('dijk-controls').style.display='none';
    if (rowEl) rowEl.style.display='flex';
  } else if (t==='span') {
    subtabsEl.style.display='flex';
    subtabsEl.innerHTML=`<div class="subtab active" data-sub="prim">Prim's</div><div class="subtab" data-sub="kruskal">Kruskal's</div>`;
    dirEl.style.display='none';
    activeDir='undirected';
    document.getElementById('order-toggle').style.display='none';
    document.getElementById('visit-toggle').style.display='none';
    document.getElementById('topo-controls').style.display='none'; document.getElementById('span-controls').style.display='none'; document.getElementById('dijk-controls').style.display='none';
    document.getElementById('span-controls').style.display='flex';
    if (rowEl) rowEl.style.display='flex';
  } else if (t==='topo') {
    subtabsEl.style.display='flex';
    subtabsEl.innerHTML=`<div class="subtab active" data-sub="dfs">DFS</div><div class="subtab" data-sub="kahn">Kahn's</div>`;
    dirEl.style.display='none';
    activeDir='undirected';
    document.getElementById('order-toggle').style.display='none';
    document.getElementById('visit-toggle').style.display='none';
    document.getElementById('topo-controls').style.display='flex'; document.getElementById('span-controls').style.display='none'; document.getElementById('dijk-controls').style.display='none';
    if (rowEl) rowEl.style.display='flex';
  } else if (t==='dijk') {
    subtabsEl.style.display='none';
    dirEl.style.display='flex';
    document.getElementById('order-toggle').style.display='none';
    document.getElementById('visit-toggle').style.display='none';
    document.getElementById('topo-controls').style.display='none'; document.getElementById('span-controls').style.display='none';
    document.getElementById('dijk-controls').style.display='flex';
    if (rowEl) rowEl.style.display='flex';
  } else {
    activeDir='undirected';
    document.getElementById('order-toggle').style.display='none';
    document.getElementById('visit-toggle').style.display='none';
    document.getElementById('topo-controls').style.display='none'; document.getElementById('span-controls').style.display='none'; document.getElementById('dijk-controls').style.display='none';
    if (rowEl) rowEl.style.display='none';
  }
  doReset();
});
